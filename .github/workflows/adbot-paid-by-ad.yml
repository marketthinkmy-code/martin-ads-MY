name: adbot · paid-by-ad (which ad to scale)

# Manual, read-only: tallies real PAID sales per ad from the Paid Student List (RM1997) tab
# and joins each currently-ACTIVE ad's week-to-date spend/registrations (CPL) + 60-day CPA,
# so the operator can see which ads to scale, keep, cut, or reactivate. No writes, no pauses.

on:
  workflow_dispatch: {}
  push:
    branches: ["claude/sweet-curie-b6vql4"]
    paths:
      - ".github/workflows/adbot-paid-by-ad.yml"
      - "scripts/paid_by_ad.py"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: paid-by-ad report
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/paid_by_ad.py
