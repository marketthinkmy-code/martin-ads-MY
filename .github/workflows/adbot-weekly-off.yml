name: adbot · weekly OFF (Wed 15:00 MYT)

# Pauses every active ad in the account (whole-account: MTC + STOCKBLOOM) and labels them,
# so weekly-on can resume exactly this set.
# Cron is UTC: Wed 07:00 UTC == Wed 15:00 Asia/Kuala_Lumpur (GMT+8).

on:
  schedule:
    # GitHub drops/delays scheduled runs (the 15:09 primary was dropped on 2026-06-24), so fire
    # several times across the OFF window and let idempotency sort it out: each re-run pauses only
    # still-live ads, and a fully-paused account is a clean no-op. Minutes kept off ":00"/":30".
    - cron: "9 7 * * 3"        # Wed 15:09 MYT (primary)
    - cron: "24 7 * * 3"       # Wed 15:24 MYT — backup
    - cron: "39 7 * * 3"       # Wed 15:39 MYT — backup
    - cron: "9 8 * * 3"        # Wed 16:09 MYT — last-chance backup
  workflow_dispatch:           # allow manual runs from the Actions tab
    inputs:
      dry_run:
        description: "Dry run (list which live ads WOULD be paused, write nothing)"
        type: boolean
        default: false

concurrency:
  group: adbot-weekly
  cancel-in-progress: false

jobs:
  weekly-off:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Pause all managed ads (weekly OFF)
        env:
          # pip install . is non-editable, so settings.py lands in site-packages and its
          # __file__-relative repo-root guess misses config/config.yaml. Point it at the checkout.
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python -m adbot weekly_off ${{ inputs.dry_run && '--dry-run' || '' }}
