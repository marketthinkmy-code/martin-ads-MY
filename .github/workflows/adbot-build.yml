name: adbot · build (real 1-1-10, PAUSED)

# Real build of the JUNE 1-1-10: creates 1 CBO campaign + 1 broad ad set + 10 ads, ALL PAUSED
# (build.activate_after_build is false -> nothing delivers, ZERO spend until you activate in Ads
# Manager). Captions are READ from Notion by Content ID (notion.captions_source). Media is reused
# from the cache (no re-upload). Entity IDs are persisted back to the branch. Triggers on manual
# dispatch or when THIS file changes.

on:
  workflow_dispatch: {}
  push:
    branches: ["claude/sweet-curie-b6vql4"]
    paths:
      - ".github/workflows/adbot-build.yml"

concurrency:
  group: adbot-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to persist state/ (entity ids, media cache) back to the branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Real build — 1 campaign + 1 ad set + 10 ads, ALL PAUSED (no spend)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python -m adbot build
      - name: Persist created entity IDs + media cache back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/entities.json state/media_cache.json state/doc_index.json || true
          git commit -m "build: persist created 1-1-10 entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
