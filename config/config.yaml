# ─────────────────────────────────────────────────────────────────────────────
# adbot — non-secret operator config for martin-ads-MY
# Brand: Martin MY ·《儿童长高方程式》· 馬丁藥師 (kids-growth conditioning course)
# Secrets live in .env (see .env.example).  `python -m adbot doctor` validates this file.
#
# Confirmed SAME as the soocheng template: country MY · currency MYR · timezone GMT+8 ·
# language Chinese (locale 1004) · objective OUTCOME_SALES / OFFSITE_CONVERSIONS /
# COMPLETE_REGISTRATION.  cron schedules in .github/workflows are UNCHANGED.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1011719073600566"   # Martin MY ad account
  page_id: "341825319024143"               # FB Page the ads run under
  instagram_user_id: "7085012808290550"    # IG Business Account; null to omit
  pixel_id: "1189593242351293"             # pixel / dataset id for conversion tracking

  objective: "OUTCOME_SALES"             # confirmed same as template
  optimization_goal: "OFFSITE_CONVERSIONS"   # "Maximize number of conversions"
  conversion_event: "COMPLETE_REGISTRATION"  # Ads Manager "Complete registration" (custom_event_type)
  special_ad_categories: []              # none (kids-growth education — not a restricted category)

  lead_destination:
    type: "WEBSITE"                      # WEBSITE | INSTANT_FORM | MESSENGER | WHATSAPP
    link_url: "https://as.dr-martin.com.tw/kids-growth-formula-landing"
  conversion_domain: "https://as.dr-martin.com.tw/"   # bare domain derived = as.dr-martin.com.tw (verify it in Meta Business settings)
  call_to_action: "LEARN_MORE"           # SIGN_UP / LEARN_MORE / GET_OFFER / SUBSCRIBE ...
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"                    # CBO — campaign-level budget
    daily_amount_myr: 250                # CBO daily budget (MYR)
    currency: "MYR"                      # confirmed same
    adset_min_spend_myr: 50              # per-ad-set minimum daily spend (>=50)

  targeting:
    countries: ["MY"]                    # confirmed same
    age_min: 35                          # parents of 10-17yo kids
    age_max: 65
    advantage_audience: 1                # 1 = Broad/Advantage+ ON; 0 = hard age cap
    locales: [1004]                      # confirmed same — 1004 = Chinese (All)

  build:
    creatives_per_adset: 10              # the "N" in 1-1-N
    activate_after_build: true           # auto-activate at daily_amount_myr after a verified build

naming:
  prefix: "MARTIN-MY"                    # name prefix scoping every entity this bot creates
  weekly_off_label: "ADBOT_WEEKLY_OFF"   # structural — do not change

drive:
  # Set to Drive folder "JUNE 2 (月中)" — current structured set: SINGLE IMAGES (3) +
  # CAROUSEL (1, 6 cards) = 4 creative units. NO videos (those are in the separate "2026"
  # tree). For a full 1-1-10 incl. videos, consolidate the intended 10 into one folder and
  # update this id. MUST be shared with the service-account email (client_email in the key).
  creatives_folder_id: "1rsllkhmbadYmyAQ6porZif7FDelRfSAO"
  carousel_subfolder_marker: "carousel"     # matches CAROUSEL / CAROUSEL 1 / CAROUSEL 2
  script_sidecar_ext: ".txt"                # NOTE: scripts are currently a Google Doc, not .txt sidecars (optional)

google_docs:
  caption_log_doc_id: ""                 # empty -> auto-create on first write
  idea_backlog_doc_id: ""                # empty -> auto-create on first write

kpi:
  cpl_threshold_myr: 55.00               # pause an ad above this CPL (MYR)
  cpl_min_spend_myr: 100.00              # only judge an ad once it has spent >= this (MYR)
  cpl_lookback: "week_thu"               # week-to-date from Thursday (the weekly ON/reset)
  pause_zero_lead_after_spend: true      # spent >= cpl_min_spend with 0 results -> infinite CPL -> pause
  cpl_hold: []                           # ad-name substrings temporarily exempt from auto-pause

cpa:                                     # cost per real PAID acquisition (joins the paid-list sheet)
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"   # "Paid Student List" sheet (share with the SA email)
  sales_tab: "Paid Student List (RM1997)"   # NOTE: tab label says RM1997 but price_myr below is 2591 — confirm
  price_myr: 2591.00                     # default pax price (sheet's Amount column overrides per row)
  target_myr: 740.00                     # primary target CPA
  healthy_max_myr: 860.00                # end of healthy range (NOT an auto-pause line)
  max_acceptable_myr: 1040.00            # above here -> pause candidate after diagnosis
  hard_stop_myr: 1300.00                 # above here (with real sales) -> auto-pause
  conversion_days: 14                    # don't judge CPA / 'no sales' until this old
  min_spend_myr: 1000.00                 # need >= this spend before a CPA verdict is fair

schedule:                                # informational; the real schedule lives in .github/workflows (UNCHANGED)
  timezone: "Asia/Kuala_Lumpur"          # GMT+8 (no DST) — confirmed same
  weekly_off: { day: "WED", time: "15:00" }   # pause ALL            -> workflow cron 9 7 * * 3 (+16:09 backup)
  weekly_on:  { day: "THU", time: "00:00" }   # resume what Wed paused -> workflow cron 9 16 * * 3 (+ backups)
  monitor_interval_hours: 1
